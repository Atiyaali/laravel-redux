version: "3.9"
services:
 app:
  container_name: "Laravel_App"
  build:
     context: .
  depends_on:
   - db
  volumes:
      - appdata:/app
  environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost
      BASE_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravelReact
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: predis

 nginx:
  build:
   context: ./nginx
  ports:
    - 80:80
  volumes:
      - appdata:/app
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
  container_name: "nginx"
  depends_on:
   - app
  
 db:
  image: mysql:8.0
  container_name: db
  command: --sql-mode=""
  environment:
      MYSQL_DATABASE: laravelReact
      MYSQL_ROOT_PASSWORD: root
      # MYSQL_USER: root
      # MYSQL_PASSWORD: root
  volumes:
   - dbdata:/var/lib/mysql
  ports:
   - 3306:3306
 phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db
 redis:
  image: redis:7-alpine
  container_name: redis
  restart: unless-stopped
  ports:
    - "6379:6379"
volumes:
  dbdata:
  appdata:


