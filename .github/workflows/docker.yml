name: Docker Image CI
on: 
  push:
    branches: ["main"]
  pull_request: 
    branches: ["main"]
jobs:
  #here docker is the job and github assign seperate server for each job to run the steps
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: Build Backend Image
        run: |
          docker build \
          -t atiyadocker/redux-laravel:${{ github.sha }} \
          -t atiyadocker/redux-laravel:latest \
          .
    
      - name: Build Nginx Image
        run: |
          docker build \
          -t atiyadocker/redux-laravel-nginx:${{ github.sha }} \
          -t atiyadocker/redux-laravel-nginx:latest \
          ./nginx
          
      - name: push app image
        run: |
          docker push atiyadocker/redux-laravel:${{ github.sha }}
          docker push atiyadocker/redux-laravel:latest
   
      - name: push nginx image
        run: |
          docker push atiyadocker/redux-laravel-nginx:${{ github.sha }}
          docker push atiyadocker/redux-laravel-nginx:latest
        

